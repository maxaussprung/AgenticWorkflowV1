apiVersion: v1
kind: Service
metadata:
  name: {{ include "release.fullname" . }}-hsvc
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: {{ include "release.fullname" . }}
  ports:
  - name: http
    port: {{ .Values.container.port }}
    targetPort: {{ .Values.container.port }}
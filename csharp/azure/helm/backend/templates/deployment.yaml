apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "release.fullname" . }}-deployment
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ include "release.fullname" . }}
  replicas: {{ .Values.deployment.replicas }}
  template:
    metadata:
      labels:
        app: {{ include "release.fullname" . }}
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ include "release.fullname" . }}-sa
      containers:
      - name: {{ .Values.container.name }}
        image: "{{ .Values.container.image }}:{{ .Values.container.imageVersion }}"
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.container.port }}
        resources:
          {{- toYaml .Values.container.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health/ready/
            port: 8080
          initialDelaySeconds: 180
          periodSeconds: 60
        livenessProbe:
          httpGet:
            path: /health/live/
            port: 8080
          initialDelaySeconds: 180
          periodSeconds: 60
        securityContext:
          runAsNonRoot: true
          runAsUser: 64198
          runAsGroup: 64198
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - all
        volumeMounts:
          - mountPath: /app/appsettings.k8s.json
            name: {{ include "release.fullname" . }}-appsettings-cm
            subPath: appsettings.json
      volumes:
        - name: {{ include "release.fullname" . }}-appsettings-cm
          configMap:
            name: {{ include "release.fullname" . }}-appsettings-cm